<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MV EXPRESS Login</title>
  <style>
    :root{
      --primary:#2563eb;
      --accent:#38bdf8;
      --text:#0f172a;
      --muted:#64748b;
      --card:#ffffff;
      --shadow:0 18px 40px rgba(15,23,42,0.16);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family:"Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56,189,248,0.20), transparent 25%),
        radial-gradient(circle at bottom right, rgba(37,99,235,0.18), transparent 25%),
        linear-gradient(135deg, #1d4ed8, #38bdf8);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .login-card{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,0.98);
      backdrop-filter:blur(10px);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .hero{
      padding:26px 26px 18px;
      background:linear-gradient(135deg, rgba(37,99,235,0.98), rgba(56,189,248,0.92));
      color:#fff;
    }

    .hero-row{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .hero-logo{
      width:74px;
      height:74px;
      border-radius:18px;
      background:#fff;
      padding:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      box-shadow:0 10px 24px rgba(0,0,0,0.12);
    }

    .hero-logo img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    .hero h1{
      margin:0;
      font-size:28px;
      font-weight:900;
      line-height:1.05;
    }

    .hero p{
      margin:8px 0 0;
      font-size:14px;
      color:rgba(255,255,255,0.92);
    }

    .content{
      padding:24px 24px 26px;
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      display:block;
      margin-bottom:6px;
      color:var(--text);
      font-size:13px;
      font-weight:800;
    }

    .field input{
      width:100%;
      padding:13px 14px;
      border:1px solid #dbe3ef;
      border-radius:14px;
      outline:none;
      font-size:14px;
      background:#fff;
    }

    .field input:focus{
      border-color:#2563eb;
      box-shadow:0 0 0 4px rgba(37,99,235,0.10);
    }

    .login-btn{
      width:100%;
      border:none;
      padding:14px;
      border-radius:14px;
      background:linear-gradient(135deg, #2563eb, #38bdf8);
      color:#fff;
      font-weight:900;
      font-size:15px;
      cursor:pointer;
      margin-top:4px;
    }

    .msg{
      min-height:20px;
      margin-top:12px;
      font-size:13px;
      font-weight:800;
    }

    .error{ color:#dc2626; }
    .success{ color:#16a34a; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="hero">
      <div class="hero-row">
        <div class="hero-logo">
          <img src="./logo.png?v=5" alt="MV EXPRESS Logo" />
        </div>
        <div>
          <h1>MV EXPRESS</h1>
          <p>Prints & Courier Admin Login</p>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="field">
        <label>Username</label>
        <input id="username" autocomplete="off" />
      </div>

      <div class="field">
        <label>Password</label>
        <input id="password" type="password" autocomplete="off" />
      </div>

      <button class="login-btn" onclick="login()">Login</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const msg = document.getElementById("msg");
      msg.textContent = "";
      msg.className = "msg";

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Login failed");

        localStorage.setItem("loggedIn", "true");
        msg.textContent = "Login successful";
        msg.className = "msg success";

        setTimeout(() => {
          window.location.href = "admin.html";
        }, 300);
      } catch (err) {
        msg.textContent = err.message;
        msg.className = "msg error";
      }
    }

    document.getElementById("password").addEventListener("keydown", function(e) {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
