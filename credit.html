<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Credit Management</title>
  <style>
    :root{
      --primary:#2563eb;
      --accent:#38bdf8;
      --border:#dbe3ef;
      --text:#0f172a;
      --muted:#64748b;
      --shadow:0 16px 34px rgba(15,23,42,0.08);
      --success:#16a34a;
      --warning:#f59e0b;
      --danger:#dc2626;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:"Segoe UI", Arial, sans-serif;
      background:radial-gradient(circle at top left, rgba(56,189,248,0.10), transparent 25%), linear-gradient(135deg, #eff6ff, #f8fbff);
      color:var(--text);
      padding:20px;
    }
    .container{
      max-width:1400px;
      margin:auto;
      background:#fff;
      border:1px solid var(--border);
      border-radius:24px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    .header{
      background:linear-gradient(135deg, var(--primary), var(--accent));
      color:#fff;
      padding:22px 26px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .header h2{ margin:0; font-size:30px; font-weight:900; }
    .header p{ margin:6px 0 0; font-size:14px; color:rgba(255,255,255,0.92); }
    .header button{
      border:none; border-radius:14px; padding:11px 15px;
      background:rgba(255,255,255,0.18); color:#fff; font-weight:800; cursor:pointer;
    }
    .content{ padding:22px; }
    .panel{
      background:#fff;
      border:1px solid var(--border);
      border-radius:20px;
      padding:18px;
      margin-bottom:18px;
    }
    .panel-title{ margin:0 0 14px; font-size:22px; font-weight:900; }
    .grid{
      display:grid;
      grid-template-columns:repeat(6, minmax(0,1fr));
      gap:12px;
    }
    .field{ display:flex; flex-direction:column; gap:6px; }
    .field label{ font-size:13px; font-weight:800; color:#334155; }
    input, select{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--border);
      border-radius:14px;
      outline:none;
      background:#fff;
      font-size:14px;
      min-height:46px;
    }
    input:focus, select:focus{
      border-color:#2563eb;
      box-shadow:0 0 0 4px rgba(37,99,235,0.12);
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }
    button{
      border:none; border-radius:12px; padding:11px 15px;
      cursor:pointer; font-weight:800; color:#fff; min-height:40px;
    }
    .save{ background:var(--success); }
    .clear{ background:#64748b; }
    .edit{ background:var(--warning); }
    .delete{ background:var(--danger); }
    .table-wrap{
      overflow:auto;
      border:1px solid var(--border);
      border-radius:18px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      background:#fff;
    }
    th{
      background:#eef5ff;
      color:#1e3a8a;
      padding:13px 10px;
      border-bottom:1px solid var(--border);
      font-size:13px;
      text-align:center;
    }
    td{
      padding:12px 10px;
      text-align:center;
      border-bottom:1px solid #edf2f7;
      font-size:13px;
      word-break:break-word;
    }
    tr:hover td{ background:#f9fbff; }
    .action-group{
      display:flex;
      gap:8px;
      justify-content:center;
      flex-wrap:wrap;
    }
    .empty{
      text-align:center;
      color:var(--muted);
      font-weight:800;
      padding:24px;
    }
    .mode-badge{
      display:inline-block;
      margin-left:10px;
      padding:6px 10px;
      border-radius:999px;
      background:#eff6ff;
      color:#1d4ed8;
      font-size:12px;
      font-weight:800;
      vertical-align:middle;
    }
    @media (max-width: 1200px){ .grid{ grid-template-columns:repeat(3, minmax(0,1fr)); } }
    @media (max-width: 700px){ .grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h2>💰 Credit Management <span id="editState" class="mode-badge" style="display:none;">Edit Mode</span></h2>
        <p>Manage customer credit records professionally</p>
      </div>
      <button type="button" onclick="window.location.href='admin.html'">Back to Admin</button>
    </div>

    <div class="content">
      <div class="panel">
        <h3 class="panel-title">Credit Entry</h3>

        <div class="grid">
          <div class="field">
            <label>Customer Name</label>
            <input id="customer_name" placeholder="Customer Name" />
          </div>

          <div class="field">
            <label>Phone Number</label>
            <input id="phone" placeholder="Phone Number" />
          </div>

          <div class="field">
            <label>Courier Name</label>
            <input id="courier" placeholder="Courier Name" />
          </div>

          <div class="field">
            <label>Credit Amount</label>
            <input id="amount" type="number" step="0.01" placeholder="Credit Amount" />
          </div>

          <div class="field">
            <label>Parcel Weight</label>
            <input id="weight" type="number" step="0.01" placeholder="Parcel Weight" />
          </div>

          <div class="field">
            <label>Destination</label>
            <input id="destination" placeholder="Destination" />
          </div>

          <div class="field">
            <label>Status</label>
            <select id="status">
              <option value="Pending">Pending</option>
              <option value="Paid">Paid</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button class="save" onclick="saveCredit()">Save Record</button>
          <button class="clear" onclick="clearForm()">Clear</button>
        </div>
      </div>

      <div class="panel">
        <h3 class="panel-title">Credit Records</h3>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Courier</th>
                <th>Amount</th>
                <th>Weight</th>
                <th>Destination</th>
                <th>Status</th>
                <th>Created</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr><td colspan="9" class="empty">Loading credit records...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (localStorage.getItem("loggedIn") !== "true") {
      window.location.href = "login.html";
    }

    let editId = null;
    let creditCache = [];

    const customer_name = document.getElementById("customer_name");
    const phone = document.getElementById("phone");
    const courier = document.getElementById("courier");
    const amount = document.getElementById("amount");
    const weight = document.getElementById("weight");
    const destination = document.getElementById("destination");
    const statusEl = document.getElementById("status");
    const editState = document.getElementById("editState");
    const tbody = document.getElementById("tbody");

    async function fetchJSON(url, options = {}) {
      const res = await fetch(url, options);
      const text = await res.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { error: text || "Request failed" };
      }
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function clearForm() {
      editId = null;
      customer_name.value = "";
      phone.value = "";
      courier.value = "";
      amount.value = "";
      weight.value = "";
      destination.value = "";
      statusEl.value = "Pending";
      editState.style.display = "none";
      customer_name.focus();
    }

    function fillFormForEdit(row) {
      editId = row.id;
      customer_name.value = row.customer_name || "";
      phone.value = row.phone || "";
      courier.value = row.courier || "";
      amount.value = row.amount ?? "";
      weight.value = row.weight ?? "";
      destination.value = row.destination || "";
      statusEl.value = row.status || "Pending";
      editState.style.display = "inline-block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function loadCredits() {
      tbody.innerHTML = `<tr><td colspan="9" class="empty">Loading credit records...</td></tr>`;

      try {
        creditCache = await fetchJSON("/api/credits");
        tbody.innerHTML = "";

        if (!creditCache.length) {
          tbody.innerHTML = `<tr><td colspan="9" class="empty">No credit records found</td></tr>`;
          return;
        }

        creditCache.forEach(row => {
          tbody.innerHTML += `
            <tr>
              <td>${escapeHtml(row.customer_name || "-")}</td>
              <td>${escapeHtml(row.phone || "-")}</td>
              <td>${escapeHtml(row.courier || "-")}</td>
              <td>${escapeHtml(row.amount ?? "-")}</td>
              <td>${escapeHtml(row.weight ?? "-")}</td>
              <td>${escapeHtml(row.destination || "-")}</td>
              <td>${escapeHtml(row.status || "-")}</td>
              <td>${row.createdAt ? new Date(row.createdAt).toLocaleString() : "-"}</td>
              <td>
                <div class="action-group">
                  <button class="edit" onclick="fillCreditById('${row.id}')">Edit</button>
                  <button class="delete" onclick="deleteCredit('${row.id}')">Delete</button>
                </div>
              </td>
            </tr>
          `;
        });
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="9" class="empty">${escapeHtml(err.message)}</td></tr>`;
      }
    }

    function fillCreditById(id) {
      const row = creditCache.find(c => c.id === id);
      if (row) fillFormForEdit(row);
    }

    async function saveCredit() {
      const payload = {
        customer_name: customer_name.value.trim(),
        phone: phone.value.trim(),
        courier: courier.value.trim(),
        amount: amount.value.trim(),
        weight: weight.value.trim(),
        destination: destination.value.trim(),
        status: statusEl.value
      };

      if (!payload.customer_name) {
        alert("Customer name is required");
        return;
      }

      try {
        if (editId) {
          await fetchJSON(`/api/credits/${editId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          alert("Credit record updated successfully");
        } else {
          await fetchJSON("/api/credits", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          alert("Credit record added successfully");
        }

        clearForm();
        loadCredits();
      } catch (err) {
        alert(err.message);
      }
    }

    async function deleteCredit(id) {
      if (!confirm("Delete this credit record?")) return;

      try {
        await fetchJSON(`/api/credits/${id}`, { method: "DELETE" });

        if (editId === id) {
          clearForm();
        }

        loadCredits();
      } catch (err) {
        alert(err.message);
      }
    }

    loadCredits();
  </script>
</body>
</html>
